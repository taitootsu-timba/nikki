name: build-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # ← これが超重要（gh-pages に push できる）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # リポジトリを取得
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true

      # Hugo セットアップ
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.155.3'
          extended: true

      # Hugo ビルド
      - name: Build
        run: hugo --minify

      # gh-pages ブランチへデプロイ
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

